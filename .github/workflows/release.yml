name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and attach bundle to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Build the bundle
        run: |
          npm install
          npm run build

      # Attach the built file to the published release so HACS can download it directly.
      - name: Upload bundle to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/xiaomi-fan-card.js
          asset_name: xiaomi-fan-card.js
          tag: ${{ github.ref }}
          overwrite: true
